  <line x1="0" y1="315" x2="1200" y2="315" stroke="#1e1e2e" stroke-width="0.5"/>
  <line x1="0" y1="472" x2="1200" y2="472" stroke="#1e1e2e" stroke-width="0.5"/>
  <line x1="300" y1="0" x2="300" y2="630" stroke="#1e1e2e" stroke-width="0.5"/>
  <line x1="600" y1="0" x2="600" y2="630" stroke="#1e1e2e" stroke-width="0.5"/>
  <line x1="900" y1="0" x2="900" y2="630" stroke="#1e1e2e" stroke-width="0.5"/>

  <!-- BOLA GRANDE direita — scale(4.5) translate(695,80) -->
  <g transform="translate(695,80) scale(4.5)">
