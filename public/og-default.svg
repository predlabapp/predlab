    <linearGradient id="s1" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#fbbf24"/><stop offset="100%" stop-color="#f97316"/></linearGradient>
    <linearGradient id="s2" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#fcd34d"/><stop offset="100%" stop-color="#f59e0b"/></linearGradient>
    <linearGradient id="s3" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#fde68a"/><stop offset="100%" stop-color="#fbbf24"/></linearGradient>
    <!-- Bola grande: scale 4.5, translate(695,80), clip height=72*4.5=324 -->
    <clipPath id="clip_lg"><rect x="695" y="80" width="450" height="324"/></clipPath>
    <!-- Ícone pequeno: scale 1.3, translate(60,55), clip height=72*1.3=93.6 -->
