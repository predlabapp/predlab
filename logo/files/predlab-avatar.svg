<svg width="400" height="400" viewBox="0 0 400 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad_curve" x1="0" y1="0" x2="400" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#7c6af7"/>
    </linearGradient>
    <linearGradient id="grad_fill" x1="0" y1="0" x2="400" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7c6af7" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0.05"/>
    </linearGradient>
    <radialGradient id="grad_glow" cx="50%" cy="30%" r="50%">
      <stop offset="0%" stop-color="#7c6af7" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#7c6af7" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" rx="88" fill="#0f0f1a"/>

  <!-- Subtle glow -->
  <rect width="400" height="400" rx="88" fill="url(#grad_glow)"/>

  <!-- Grid lines -->
  <line x1="60" y1="290" x2="340" y2="290" stroke="#2a2a3e" stroke-width="1.5"/>
  <line x1="60" y1="230" x2="340" y2="230" stroke="#1e1e2e" stroke-width="1"/>
  <line x1="60" y1="170" x2="340" y2="170" stroke="#1e1e2e" stroke-width="1"/>
  <line x1="60" y1="110" x2="340" y2="110" stroke="#1e1e2e" stroke-width="1"/>

  <!-- Curve fill -->
  <path d="M60 290 Q100 290 140 278 Q175 265 200 185 Q225 105 258 92 Q285 80 308 98 Q328 115 340 290 Z"
        fill="url(#grad_fill)"/>

  <!-- Main curve -->
  <path d="M60 290 Q100 290 140 278 Q175 265 200 185 Q225 105 258 92 Q285 80 308 98 Q328 115 340 290"
        stroke="url(#grad_curve)" stroke-width="10" fill="none"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Peak glow -->
  <circle cx="258" cy="92" r="24" fill="#a78bfa" opacity="0.15"/>
  <circle cx="258" cy="92" r="12" fill="#a78bfa" opacity="0.25"/>

  <!-- Peak dot -->
  <circle cx="258" cy="92" r="8" fill="#a78bfa"/>

  <!-- X axis -->
  <line x1="60" y1="290" x2="340" y2="290" stroke="#3d3580" stroke-width="2"/>

  <!-- Axis arrow -->
  <path d="M334 284 L340 290 L334 296" stroke="#3d3580" stroke-width="2" fill="none" stroke-linecap="round"/>
</svg>
