<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@800&family=DM+Mono:wght@400&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #111118; padding: 40px 20px; font-family: 'DM Mono', monospace; }
  .label { font-size: 11px; color: #555570; letter-spacing: 0.2em; text-transform: uppercase; margin-bottom: 24px; text-align: center; }
  .section { margin-bottom: 32px; }
  .section-title { font-size: 10px; color: #555570; letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 10px; }
  .navbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 24px; height: 56px;
    background: #0a0a0f;
    border-radius: 10px;
    border: 1px solid #1e1e2e;
    margin-bottom: 6px;
  }
  .nav-right { display: flex; align-items: center; gap: 12px; }
  .nav-link { font-size: 12px; color: #8888aa; font-family: 'Syne', sans-serif; }
  .nav-btn { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 12px; padding: 6px 14px; border-radius: 7px; cursor: pointer; }
  .ghost { background: transparent; border: 1px solid #1e1e2e; color: #8888aa; }
  .primary { background: #7c6af7; border: none; color: white; }
  .caption { font-size: 10px; color: #555570; text-align: center; }
</style>
</head>
<body>

<div class="label">PredLab · Navbar test · Base branca + sem fundo</div>

<!-- Versão anterior -->
<div class="section">

      </defs>
      <rect width="48" height="48" rx="11" fill="#1a0d35"/>

      <circle cx="24" cy="21.1" r="15.8" fill="url(#b1)"/>
      <circle cx="24" cy="21.1" r="15.8" fill="url(#l1)"/>

      <path d="M30.2,12.5 L30.9,14.8 L33.3,15.5 L30.9,16.2 L30.2,18.5 L29.5,16.2 L27.2,15.5 L29.5,14.8 Z" fill="#d97706"/>

      <text x="56" y="32" font-family="'Syne','Arial Black',sans-serif" font-weight="800" font-size="22" letter-spacing="-0.5" fill="#e8e8f0">pred</text>
      <text x="106" y="32" font-family="'Syne','Arial Black',sans-serif" font-weight="800" font-size="22" letter-spacing="-0.5" fill="#7c6af7">lab</text>
    </svg>
    <div class="nav-right">
      <span class="nav-link">Rankings</span>
      <button class="nav-btn ghost">Entrar</button>
      <button class="nav-btn primary">Começar</button>
    </div>
  </div>
  <div class="caption">Base escura · fundo #1a0d35 separado</div>
</div>
