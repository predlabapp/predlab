      <!--
        Orb centrado em cx=1220, cy=210, r=175
        Base colada: topo da base = cy + r = 210+175 = 385
        Stand rect: y=385, height=30, rx=15
        Shadow ellipse: cy=385+30=415
      -->
      <ellipse cx="1220" cy="418" rx="160" ry="12" fill="#2a1560" opacity="0.5"/>
      <rect x="1162" y="385" width="116" height="30" rx="15" fill="#130a28"/>

      <circle cx="1220" cy="210" r="175" fill="url(#blight1)"/>
      <circle cx="1220" cy="210" r="175" fill="url(#brim1)"/>

      <!--
        Escala: orb icon cx=50,cy=44,r=33 → banner cx=1220,cy=210,r=175
        escala = 175/33 = 5.303
        offsetX = 1220 - 50*5.303 = 1220 - 265.15 = 954.85
        offsetY = 210 - 44*5.303 = 210 - 233.33 = -23.33

        Star 1 anchor (44,45.5): x=44*5.303+954.85=1187.98≈1188, y=45.5*5.303-23.33=218
        Star 2 anchor (63,32.3): x=63*5.303+954.85=1289, y=32.3*5.303-23.33=148
        Star 3 anchor (63,59):   x=63*5.303+954.85=1289, y=59*5.303-23.33=289
      -->
      <!-- Star 1 large centre-left -->
      <path d="M1188,155 L1200,193 L1238,205 L1200,217 L1188,255 L1176,217 L1138,205 L1176,193 Z" fill="#d97706"/>
      <path d="M1188,155 L1200,193 L1238,205 L1200,217 L1188,255 L1176,217 L1138,205 L1176,193 Z" fill="#fbbf24" opacity="0.55"/>

      <!--
        icon orb: cx=156, cy=196, r=34
        base topo = 196+34 = 230
      -->
      <ellipse cx="156" cy="243" rx="18" ry="3" fill="#2a1560" opacity="0.5"/>
      <rect x="143" y="230" width="26" height="13" rx="6.5" fill="#130a28"/>
      <circle cx="156" cy="196" r="34" fill="url(#ib1)"/>

      <path d="M169,203 L170,206 L173,207 L170,208 L169,211 L168,208 L165,207 L168,206 Z" fill="#d97706"/>
